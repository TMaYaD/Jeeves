version: "3.9"

# Local development stack:
#   postgres   — primary datastore
#   powersync  — PowerSync sync layer (Postgres → clients)
#   backend    — FastAPI service
#   redis      — Celery broker

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: jeeves
      POSTGRES_PASSWORD: jeeves
      POSTGRES_DB: jeeves
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # PowerSync requires logical replication
    command: >
      postgres
        -c wal_level=logical
        -c max_wal_senders=10
        -c max_replication_slots=10
        -c log_connections=on
        -c log_disconnections=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeeves -d jeeves"]
      interval: 5s
      timeout: 5s
      retries: 10

  powersync:
    image: journeyapps/powersync-service:1.20.5
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POWERSYNC_CONFIG_PATH: /config/sync-config.yaml
      # PowerSync's JWKS loader expects symmetric-key material as base64url
      # (no padding).  The default below encodes "insecure-dev-key".
      PS_JEEVES_SECRET_KEY_B64: "${PS_JEEVES_SECRET_KEY_B64:-aW5zZWN1cmUtZGV2LWtleQ}"
      PS_DATA_SOURCE_URI: "postgresql://jeeves:jeeves@postgres:5432/jeeves"
    volumes:
      - ./powersync:/config
    ports:
      - "8080:8080"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      powersync:
        condition: service_started
      redis:
        condition: service_started
    environment:
      JEEVES_DATABASE_URL: "postgresql+asyncpg://jeeves:jeeves@postgres:5432/jeeves"
      JEEVES_POWERSYNC_URL: "${JEEVES_POWERSYNC_URL:-http://localhost:8080}"
      JEEVES_REDIS_URL: "redis://redis:6379/0"
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
