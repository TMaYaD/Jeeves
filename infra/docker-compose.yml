version: "3.9"

# Local development stack:
#   postgres   — primary datastore
#   powersync  — PowerSync sync layer (Postgres → clients)
#   backend    — FastAPI service
#   redis      — Celery broker

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: jeeves
      POSTGRES_PASSWORD: jeeves
      POSTGRES_DB: jeeves
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    # PowerSync requires logical replication
    command: >
      postgres
        -c wal_level=logical
        -c max_wal_senders=10
        -c max_replication_slots=10
        -c log_connections=on
        -c log_disconnections=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeeves -d jeeves"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Shared JWT secret -----------------------------------------------------
  # Backend signs JWTs with `SECRET_KEY` (raw bytes).  PowerSync
  # validates them using `PS_SECRET_KEY_B64` (base64url-encoded, no
  # padding) declared in sync-config.yaml's JWKS block.  Both must derive
  # from the SAME material — mismatch = every login-time sync fails with
  # `invalid token signature` and is hard to debug from the client side.
  #
  # For dev parity both default to "insecure-dev-key" / its base64url form.
  # To override, export ONE of these in the shell before `compose up`:
  #   export SECRET_KEY="my-real-secret"
  #   export PS_SECRET_KEY_B64="$(printf 'my-real-secret' | \
  #     base64 | tr -d '=' | tr '/+' '_-')"
  # Both variables are then picked up below.

  powersync:
    image: journeyapps/powersync-service:1.20.5
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POWERSYNC_CONFIG_PATH: /config/sync-config.yaml
      # Base64url-encoded (no padding).  Default encodes "insecure-dev-key".
      PS_SECRET_KEY_B64: "${PS_SECRET_KEY_B64:-aW5zZWN1cmUtZGV2LWtleQ}"
      PS_DATA_SOURCE_URI: "postgresql://jeeves:jeeves@postgres:5432/jeeves"
    volumes:
      - ./powersync:/config
    ports:
      - "8080:8080"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      powersync:
        condition: service_started
      redis:
        condition: service_started
    environment:
      DATABASE_URL: "postgresql+asyncpg://jeeves:jeeves@postgres:5432/jeeves"
      POWERSYNC_URL: "${POWERSYNC_URL:-http://localhost:8080}"
      REDIS_URL: "redis://redis:6379/0"
      # Raw form of the same key PowerSync validates against.  Default matches
      # the base64url default above: base64url("insecure-dev-key") = "aW5zZWN1cmUtZGV2LWtleQ".
      SECRET_KEY: "${SECRET_KEY:-insecure-dev-key}"
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
