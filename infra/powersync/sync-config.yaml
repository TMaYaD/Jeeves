# PowerSync Service configuration for Jeeves (local dev).
#
# Docs: https://docs.powersync.com/self-hosting/configuration
# Reference: https://github.com/powersync-ja/self-host-demo

# --- Replication source -------------------------------------------------------
replication:
  connections:
    - type: postgresql
      # Connects to the same Postgres instance used by the backend.
      # PS_DATA_SOURCE_URI is set via the POWERSYNC_CONFIG environment.
      uri: !env PS_DATA_SOURCE_URI
      sslmode: disable
      # Required: enable logical replication slot for change capture.
      slot_name: powersync_slot

# --- Sync rules ---------------------------------------------------------------
# Three user-scoped buckets matching the three Drift tables.
# token_parameters.user_id comes from the JWT sub claim.
bucket_definitions:
  by_user_todos:
    parameters:
      - SELECT id AS user_id FROM users WHERE id = token_parameters.user_id
    data:
      - SELECT * FROM todos WHERE user_id = bucket.user_id

  by_user_tags:
    parameters:
      - SELECT id AS user_id FROM users WHERE id = token_parameters.user_id
    data:
      - SELECT * FROM tags WHERE user_id = bucket.user_id

  by_user_todo_tags:
    parameters:
      - SELECT id AS user_id FROM users WHERE id = token_parameters.user_id
    data:
      - SELECT tt.*
          FROM todo_tags tt
          JOIN todos t ON t.id = tt.todo_id
         WHERE t.user_id = bucket.user_id

# --- Client auth --------------------------------------------------------------
# Validate JWTs signed by the backend using the shared JEEVES_SECRET_KEY.
client_auth:
  # audience must match the "aud" claim issued by /powersync/credentials.
  audience: ["jeeves"]
  jwt_secrets:
    - !env PS_JEEVES_SECRET_KEY

# --- Internal storage (bucket state) ------------------------------------------
# Uses the same Postgres instance — no MongoDB required.
storage:
  type: postgresql
  uri: !env PS_DATA_SOURCE_URI
  sslmode: disable

# --- API server ---------------------------------------------------------------
api:
  port: 8080
