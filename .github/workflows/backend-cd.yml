name: Backend CD

on:
  workflow_run:
    workflows: ["Backend CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to Dokku
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DOKKU_SSH_PRIVATE_KEY }}

      - name: Add Dokku host to known hosts
        run: ssh-keyscan -H jeeves.loonyb.in >> ~/.ssh/known_hosts

      - name: Deploy backend subtree to Dokku
        run: |
          git remote add dokku ssh://dokku@jeeves.loonyb.in/jeeves
          git subtree split --prefix=backend -b deploy-backend
          git push dokku deploy-backend:main --force
