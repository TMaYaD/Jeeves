name: PR APK Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/pr-apk.yml'

concurrency:
  group: pr-apk-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-distribute:
    name: build-and-distribute
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: pub-

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('app/android/gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --debug

      - name: Compose release notes
        id: notes
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BRANCH: ${{ github.head_ref }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          NOTES="PR #${PR_NUMBER}: ${PR_TITLE} | branch: ${PR_BRANCH} | sha: ${SHORT_SHA}"
          printf 'notes=%s\n' "$NOTES" >> "$GITHUB_OUTPUT"

      - uses: wzieba/Firebase-Distribution-Github-Action@bd494989dd4bec0343f78adee87fe66e48279ad6 # v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: qa
          file: app/build/app/outputs/flutter-apk/app-debug.apk
          releaseNotes: ${{ steps.notes.outputs.notes }}
