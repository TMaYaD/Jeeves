name: PR APK Build

on:
  workflow_run:
    workflows: ["Flutter CI"]
    types: [completed]

concurrency:
  group: pr-apk-${{ github.event.workflow_run.pull_requests[0].number }}
  cancel-in-progress: true

jobs:
  check-changes:
    name: Check for relevant changes
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Detect Android-relevant changes
        id: filter
        env:
          BASE_SHA: ${{ github.event.workflow_run.pull_requests[0].base.sha }}
        run: |
          CHANGED=$(git diff --name-only "$BASE_SHA" HEAD)
          if echo "$CHANGED" | grep -qE \
            '^app/|^\.github/workflows/'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-distribute:
    name: build-and-distribute
    needs: check-changes
    if: needs.check-changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version-file: app/.fvmrc
          channel: stable
          cache: true

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: pub-

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
          key: gradle-${{ hashFiles('app/android/gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-

      - run: flutter pub get
      - run: dart run flutter_launcher_icons
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --profile --split-per-abi --target-platform android-arm64 --flavor alpha

      - name: Compose release notes
        id: notes
        env:
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          PR_TITLE: ${{ github.event.workflow_run.pull_requests[0].title }}
          PR_BRANCH: ${{ github.event.workflow_run.head_branch }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          SHORT_SHA="${COMMIT_SHA::7}"
          NOTES="PR #${PR_NUMBER}: ${PR_TITLE} | branch: ${PR_BRANCH} | sha: ${SHORT_SHA}"
          printf 'notes=%s\n' "$NOTES" >> "$GITHUB_OUTPUT"

      - uses: wzieba/Firebase-Distribution-Github-Action@bd494989dd4bec0343f78adee87fe66e48279ad6 # v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: qa
          file: app/build/app/outputs/flutter-apk/app-arm64-v8a-alpha-profile.apk
          releaseNotes: ${{ steps.notes.outputs.notes }}
