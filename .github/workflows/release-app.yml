name: App Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Extract semver from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.x"
          channel: stable
          cache: true

      - name: Stamp version into pubspec.yaml
        run: |
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.version }}+${{ github.run_number }}/" pubspec.yaml

      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --release
      - run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            app/build/app/outputs/flutter-apk/app-release.apk
            app/build/app/outputs/bundle/release/app-release.aab

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Extract semver from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.x"
          channel: stable
          cache: true

      - name: Stamp version into pubspec.yaml
        run: |
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.version }}+${{ github.run_number }}/" pubspec.yaml

      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: flutter build web --release

      - name: Archive web build
        run: tar -czf "../jeeves-web-${{ github.ref_name }}.tar.gz" web/
        working-directory: app/build

      - uses: actions/upload-artifact@v4
        with:
          name: web-artifact
          path: app/jeeves-web-${{ github.ref_name }}.tar.gz

  publish:
    name: Publish Release
    needs: [build-android, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-artifacts
          path: artifacts/android

      - uses: actions/download-artifact@v4
        with:
          name: web-artifact
          path: artifacts/web

      - name: Rename artifacts with version tag
        run: |
          mv artifacts/android/app-release.apk \
            "artifacts/android/jeeves-${{ github.ref_name }}.apk"
          mv artifacts/android/app-release.aab \
            "artifacts/android/jeeves-${{ github.ref_name }}.aab"

      - name: Publish release to GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Jeeves ${{ github.ref_name }}" \
            --generate-notes \
            "artifacts/android/jeeves-${{ github.ref_name }}.apk" \
            "artifacts/android/jeeves-${{ github.ref_name }}.aab" \
            "artifacts/web/jeeves-web-${{ github.ref_name }}.tar.gz"
