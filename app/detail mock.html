<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>Task Detail Mock</title>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
                rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
                rel="stylesheet" />
        <style type="text/tailwindcss">
                :root {
            --primary-blue: #2563eb;
            --border-light: #f1f5f9;
            --text-secondary: #64748b;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #ffffff;
            color: #000000;
        }
        .ios-status-bar {
            height: 44px;
        }
        .tag-pill {
            @apply px-2.5 py-1 rounded-md text-xs font-semibold;
        }
        .attribute-item {
            @apply flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-gray-50 border border-gray-100 text-sm font-medium text-gray-700 active:bg-gray-100;
        }
        .control-label {
            @apply text-[10px] uppercase tracking-wider text-gray-400 font-semibold mb-1;
        }
        .notes-area::placeholder {
            @apply text-gray-300;
        }
    </style>
        <style>
                body {
                        min-height: max(884px, 100dvh);
                }
        </style>
</head>

<body class="flex flex-col h-screen overflow-hidden">
        <div class="ios-status-bar flex justify-between items-center px-6 shrink-0">
                <span class="text-sm font-semibold">9:41 AM</span>
                <div class="flex items-center gap-1.5">
                        <span class="material-symbols-outlined text-sm">signal_cellular_alt</span>
                        <span class="material-symbols-outlined text-sm">wifi</span>
                        <span class="material-symbols-outlined text-sm">battery_full</span>
                </div>
        </div>
        <header class="px-6 pt-2 pb-4 border-b border-gray-100 bg-white">
                <div class="flex items-center gap-1 text-sm font-medium text-blue-600 mb-1">
                        <span class="material-symbols-outlined text-sm">folder</span>
                        <span>Marketing</span>
                </div>
                <div class="mb-4">
                        <label for="task-title" class="sr-only">Task title</label>
                        <input id="task-title" class="w-full text-2xl font-bold border-none p-0 focus:ring-0 placeholder-gray-300"
                                placeholder="Task Title" type="text" value="Draft Q3 Marketing Report" />
                </div>
                <div class="flex flex-wrap gap-2 mb-5">
                        <span class="tag-pill bg-blue-100 text-blue-700 border border-blue-200">@office</span>
                        <span class="tag-pill bg-purple-100 text-purple-700 border border-purple-200">Deep Work</span>
                        <span class="tag-pill bg-emerald-100 text-emerald-700 border border-emerald-200">Laptop</span>
                        <span class="tag-pill bg-orange-100 text-orange-700 border border-orange-200">Priority</span>
                </div>
                <div class="flex items-center gap-3">
                        <div class="attribute-item flex-1">
                                <span class="material-symbols-outlined text-lg text-gray-400">schedule</span>
                                <span>30m</span>
                        </div>
                        <div class="attribute-item flex-1">
                                <span class="material-symbols-outlined text-lg text-gray-400">bolt</span>
                                <span>Normal</span>
                        </div>
                </div>
        </header>
        <main class="flex-1 flex flex-col overflow-hidden">
                <div class="flex-1 px-6 pt-6 flex flex-col">
                        <div class="flex items-center gap-2 mb-3">
                                <span class="material-symbols-outlined text-gray-400 text-sm">notes</span>
                                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Notes</span>
                        </div>
                        <textarea
                                class="notes-area flex-1 w-full border-none p-0 focus:ring-0 resize-none text-base leading-relaxed text-gray-800"
                                placeholder="Start typing thoughts, checklists, or details for this task..."></textarea>
                </div>
                <div class="px-6 py-4 bg-gray-50/50 border-t border-gray-100">
                        <div class="grid grid-cols-1 gap-4">
                                <div class="flex items-start gap-3">
                                        <div
                                                class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center shrink-0">
                                                <span
                                                        class="material-symbols-outlined text-blue-500 text-[18px]">notifications</span>
                                        </div>
                                        <div class="flex flex-col">
                                                <span
                                                        class="text-[10px] font-bold text-gray-400 uppercase tracking-tight">Reminders</span>
                                                <div class="flex flex-col gap-1 mt-0.5">
                                                        <span class="text-sm font-medium text-gray-700">9:00 AM</span>
                                                        <span class="text-sm font-medium text-gray-400">1:30 PM</span>
                                                        <span class="text-sm font-medium text-gray-400">5:00 PM</span>
                                                </div>
                                        </div>
                                </div>
                                <div class="flex items-center gap-3">
                                        <div class="w-8 h-8 rounded-full bg-red-50 flex items-center justify-center">
                                                <span
                                                        class="material-symbols-outlined text-red-500 text-[18px]">calendar_today</span>
                                        </div>
                                        <div class="flex flex-col">
                                                <span
                                                        class="text-[10px] font-bold text-gray-400 uppercase tracking-tight">Due
                                                        Date</span>
                                                <span class="text-sm font-medium text-gray-700">Oct 26, 2023</span>
                                        </div>
                                </div>
                        </div>

                </div>
        </main>
        <div class="p-6 bg-white border-t border-gray-100">
                <button type="button"
                        class="w-full bg-[#2563eb] text-white font-semibold py-4 rounded-xl shadow-lg shadow-blue-200 active:scale-[0.98] transition-transform">
                        Start
                </button>
        </div>

</body>

</html>
