<!-- Jeeves Signature mark — dark surface, WHITE stem, BRAND tittle, transparent bg -->
<!-- Rules: tittle always BRAND #2667B7; stem flips to WHITE on dark surfaces. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Tittle: always BRAND #2667B7 -->
  <circle cx="50" cy="12" r="7" fill="#2667B7"/>
  <!-- Stem + hook: WHITE on dark surfaces -->
  <path d="M 50 24 L 50 80 Q 50 96 36 92"
        stroke="#FFFFFF" stroke-width="8"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>
</svg>
