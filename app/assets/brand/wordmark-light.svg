<!-- Jeeves wordmark — light surface: Pointillist mark + "Jeeves" (Manrope 700, INK) -->
<!-- Clear space applies around the full lockup. Minimum size: 32 px mark height. -->
<!-- Mark group uses same reference coordinates as logo-pointillist.svg,          -->
<!-- scaled (0.49) + translated to fit the 260×100 canvas and align baselines.   -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 100" width="260" height="100">
  <!-- Pointillist mark: scaled from reference coords to ~70×100 in canvas -->
  <g transform="translate(-24.5,-7.2) scale(0.49)">
    <circle cx="168" cy="44"  r="14" fill="#2667B7"/>
    <circle cx="168" cy="96"  r="13" fill="#60A5FA"/>
    <circle cx="168" cy="134" r="13" fill="#C4B5FD"/>
    <circle cx="168" cy="172" r="13" fill="#FDBA74"/>
    <circle cx="142" cy="200" r="13" fill="#F9A8D4"/>
    <circle cx="104" cy="208" r="13" fill="#6EE7B7"/>
    <circle cx="68"  cy="190" r="13" fill="#FDE68A"/>
  </g>
  <!-- "Jeeves" wordmark: Manrope 700, INK, vertically centred at y=50 -->
  <text x="78" y="50"
        font-family="Manrope, sans-serif"
        font-weight="700"
        font-size="48"
        fill="#1A1A2E"
        dominant-baseline="central">Jeeves</text>
</svg>
