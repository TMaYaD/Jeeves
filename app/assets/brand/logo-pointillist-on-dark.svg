<!-- Jeeves Pointillist mark — dark surface, per-dot hairline, transparent background -->
<!-- Usage: ≥ 32 px on dark surfaces. Never use a white plate behind the dots. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="50 24 142 204" width="142" height="204">
  <!-- Each dot: hairline ring first (r + 1.25), then solid fill on top -->
  <circle cx="168" cy="44"  r="15.25" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.25"/>
  <circle cx="168" cy="44"  r="14"    fill="#2667B7"/>
  <circle cx="168" cy="96"  r="14.25" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.25"/>
  <circle cx="168" cy="96"  r="13"    fill="#60A5FA"/>
  <circle cx="168" cy="134" r="14.25" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.25"/>
  <circle cx="168" cy="134" r="13"    fill="#C4B5FD"/>
  <circle cx="168" cy="172" r="14.25" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.25"/>
  <circle cx="168" cy="172" r="13"    fill="#FDBA74"/>
  <circle cx="142" cy="200" r="14.25" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.25"/>
  <circle cx="142" cy="200" r="13"    fill="#F9A8D4"/>
  <circle cx="104" cy="208" r="14.25" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.25"/>
  <circle cx="104" cy="208" r="13"    fill="#6EE7B7"/>
  <circle cx="68"  cy="190" r="14.25" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.25"/>
  <circle cx="68"  cy="190" r="13"    fill="#FDE68A"/>
</svg>
