<!-- Jeeves Signature mark — light surface, INK stem, BRAND tittle, transparent bg -->
<!-- Usage: any size, single-colour contexts, ≤ 32 px, favicons, monochrome. -->
<!-- Rules: tittle always BRAND #2667B7; stem INK #1A1A2E on light surfaces. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Tittle: always BRAND #2667B7, never recoloured -->
  <circle cx="50" cy="12" r="7" fill="#2667B7"/>
  <!-- Stem + hook: INK on light surfaces -->
  <path d="M 50 24 L 50 80 Q 50 96 36 92"
        stroke="#1A1A2E" stroke-width="8"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>
</svg>
