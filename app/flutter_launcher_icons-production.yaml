# Production-flavor launcher icon config.
#
# Source: Pointillist app icon on INK plate (generated by tools/generate_icons.py).
# Regenerate with: `dart run flutter_launcher_icons -f flutter_launcher_icons-production.yaml`
# Output lands under android/app/src/production/res/mipmap-*/ and is picked up
# by the Gradle `production` product flavor (see android/app/build.gradle.kts).
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/brand/icon-source-1024.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/brand/icon-adaptive-fg-1024.png"
  min_sdk_android: 21
