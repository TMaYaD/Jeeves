name: jeeves
description: A productivity-focused todos app for mobile, web, and desktop.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Local storage (offline-first)
  drift: ^2.31.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # HTTP / API
  dio: ^5.4.3
  retrofit: ^4.9.2

  # Sync (Electric SQL client)
  # electric_client: ^0.x.x  # Add when package is published

  # Notifications
  flutter_local_notifications: ^21.0.0
  # firebase_messaging: ^16.1.3   # Uncomment when Firebase is configured
  # firebase_core: ^4.6.0         # Uncomment when Firebase is configured

  # Location
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Voice / Speech
  speech_to_text: ^7.3.0

  # AI / NLP helpers
  # (calls backend AI endpoint via api_service)

  # Connectivity
  connectivity_plus: ^6.1.1

  # Utilities
  uuid: ^4.4.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  intl: ^0.20.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  sqlite3: ^2.9.4
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3
  drift_dev: ^2.31.0
  retrofit_generator: ^10.2.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
