name: jeeves
description: A productivity-focused todos app for mobile, web, and desktop.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Local storage (offline-first)
  drift: ^2.32.0
  # Bridges Drift to the sqlite_async connection that PowerSync owns, so one
  # shared SQLite file backs both.  Without this, Drift and PowerSync would
  # each open their own connection and their watchers would never see each
  # other's writes.
  drift_sqlite_async: ^0.3.0
  # sqlite_async itself is a transitive dependency of both powersync and
  # drift_sqlite_async, but imported directly in gtd_database.dart for the
  # `SqliteConnection` type in the production constructor signature.
  sqlite_async: ^0.14.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.3
  path: ^1.9.0

  # HTTP / API
  dio: ^5.4.3
  retrofit: ^4.9.2

  # Sync (PowerSync — bidirectional offline-first sync)
  powersync: ^2.0.0

  # Notifications
  flutter_local_notifications: ^21.0.0
  flutter_timezone: ^5.0.0
  timezone: ^0.11.0
  # firebase_messaging: ^16.1.3   # Uncomment when Firebase is configured
  # firebase_core: ^4.6.0         # Uncomment when Firebase is configured

  # Location
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Voice / Speech
  speech_to_text: ^7.3.0

  # AI / NLP helpers
  # (calls backend AI endpoint via api_service)

  # Navigation
  go_router: ^17.2.1

  # Connectivity
  connectivity_plus: ^7.1.1

  # Local key-value persistence (planning ritual state)
  shared_preferences: ^2.3.3

  # File import
  file_picker: ^8.1.2

  # Encrypted token storage (JWT)
  flutter_secure_storage: ^10.0.0

  # Brand / SVG
  flutter_svg: ^2.0.10+1

  # Utilities
  uuid: ^4.4.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  intl: ^0.20.2
  flutter_markdown_plus: ^1.0.7
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  sqlite3: ^3.0.0
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3
  drift_dev: ^2.32.0
  retrofit_generator: ^10.2.5
  # Icon generation: run `dart run flutter_launcher_icons` in app/ to regenerate
  # all platform icons from the canonical SVG sources in assets/brand/.
  flutter_launcher_icons: ^0.14.3

# TODO(#127-revert): Remove these overrides once riverpod_generator publishes a
# stable release that supports analyzer ^10 (tracking: rrousselGit/riverpod#4727,
# merged 2026-04-04). The CI gate in flutter-ci.yml will hard-fail when a
# newer stable version is available, forcing this block to be cleaned up.
#
# riverpod_analyzer_utils must be overridden alongside riverpod_generator:
# the git build of riverpod_generator pins riverpod_analyzer_utils 1.0.0-dev.9
# but the pub.dev copy of that package requires analyzer ^9, which conflicts
# with the >=10.0.0 constraint used by both the git build and drift_dev 2.32.
# The git copy of riverpod_analyzer_utils correctly requires analyzer >=10.0.0.
dependency_overrides:
  riverpod_generator:
    git:
      url: https://github.com/rrousselGit/riverpod.git
      ref: e8b84952e40b395ef47ab1f581eddddf64f0b2fd
      path: packages/riverpod_generator
  riverpod_analyzer_utils:
    git:
      url: https://github.com/rrousselGit/riverpod.git
      ref: e8b84952e40b395ef47ab1f581eddddf64f0b2fd
      path: packages/riverpod_analyzer_utils

flutter_launcher_icons:
  # Source: Pointillist app icon on INK plate (generated by tools/generate_icons.py).
  # Re-run `dart run flutter_launcher_icons` in app/ after any brand update.
  # Icons are generated per-flavor into android/app/src/{flavor}/res/mipmap-*/.
  flavors:
    production:
      android: true
      ios: false
      image_path: "assets/brand/icon-source-1024.png"
      adaptive_icon_background: "#1A1A2E"
      adaptive_icon_foreground: "assets/brand/icon-adaptive-fg-1024.png"
      min_sdk_android: 21
    alpha:
      android: true
      ios: false
      image_path: "assets/brand/icon-source-1024.png"
      # Red background distinguishes alpha builds from production at a glance.
      adaptive_icon_background: "#B72626"
      adaptive_icon_foreground: "assets/brand/icon-adaptive-fg-1024.png"
      min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
    - assets/images/
    - assets/icons/
  fonts:
    - family: Manrope
      fonts:
        # Variable font: single TTF covers weights 200–800. Flutter reads the
        # `wght` axis automatically when a `fontWeight` is applied.
        - asset: assets/fonts/Manrope-VariableFont_wght.ttf
