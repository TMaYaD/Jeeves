name: jeeves
description: A productivity-focused todos app for mobile, web, and desktop.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local storage (offline-first)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # HTTP / API
  dio: ^5.4.3
  retrofit: ^4.1.0

  # Sync (Electric SQL client)
  # electric_client: ^0.x.x  # Add when package is published

  # Notifications
  flutter_local_notifications: ^17.2.2
  firebase_messaging: ^15.1.0
  firebase_core: ^3.4.0

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Voice / Speech
  speech_to_text: ^6.6.2

  # AI / NLP helpers
  # (calls backend AI endpoint via api_service)

  # Utilities
  uuid: ^4.4.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  drift_dev: ^2.18.0
  retrofit_generator: ^8.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
